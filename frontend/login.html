<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Giriş — Portföy Yöneticisi</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .container { background: #1e293b; border: 1px solid #334155; border-radius: 16px; padding: 40px; width: 100%; max-width: 400px; }
    .logo { text-align: center; margin-bottom: 32px; }
    .logo h1 { font-size: 22px; color: #f8fafc; margin-top: 8px; }
    .logo span { font-size: 40px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    .form-group label { font-size: 13px; color: #94a3b8; }
    .form-group input { background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 12px 14px; color: #e2e8f0; font-size: 14px; outline: none; }
    .form-group input:focus { border-color: #38bdf8; }
    .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-size: 15px; font-weight: 600; background: #38bdf8; color: #0f172a; margin-top: 8px; transition: opacity 0.2s; }
    .btn:hover { opacity: 0.85; }
    .error { color: #ef4444; font-size: 13px; margin-top: 8px; text-align: center; }
    .link { text-align: center; margin-top: 20px; font-size: 13px; color: #64748b; }
    .link a { color: #38bdf8; text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <span>📊</span>
      <h1>Portföy Yöneticisi</h1>
    </div>
    <div class="form-group">
      <label>Kullanıcı Adı</label>
      <input id="username" type="text" placeholder="kullanici1">
    </div>
    <div class="form-group">
      <label>Şifre</label>
      <input id="password" type="password" placeholder="••••••••">
    </div>
    <div id="error" class="error"></div>
    <button class="btn" onclick="login()">Giriş Yap</button>
    <div class="link">Hesabın yok mu? <a href="/register">Kayıt Ol</a></div>
  </div>

  <script>
    // Zaten giriş yapılmışsa ana sayfaya yönlendir
    if (localStorage.getItem('token')) window.location.href = '/';

    async function login() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('error');
      errorEl.textContent = '';

      if (!username || !password) {
        errorEl.textContent = 'Tüm alanları doldurun.';
        return;
      }

      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });

      const data = await res.json();
      if (!res.ok) {
        errorEl.textContent = data.error;
        return;
      }

      localStorage.setItem('token', data.token);
      localStorage.setItem('username', data.user.username);
      window.location.href = '/';
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') login();
    });
  </script>
</body>
</html>
